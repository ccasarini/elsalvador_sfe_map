<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Salvador Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body { margin: 0; padding: 0; background: #f0f7ff; overflow: hidden; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background: #f0f7ff; /* Vibrant light sky background */
        }
        .map-header {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 1000;
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            padding: 14px 28px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
            font-family: 'Plus Jakarta Sans', sans-serif;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .map-header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: #ffffff;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.02em;
        }
        .country-label {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .label-es {
            color: #1e3a8a;
            font-size: 18px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.9));
        }
        .label-neighbor {
            color: #64748b;
            font-size: 10px;
            background: rgba(255,255,255,0.8);
            padding: 5px 12px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #cbd5e1;
        }
        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="map-header">
    <h1><span>🇸🇻</span> EL SALVADOR</h1>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {
        zoomControl: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        touchZoom: false,
        boxZoom: false,
        dragging: true
    }).setView([13.85, -88.9], 9);

    // Vibrant "Pop" Styles
    const focusStyle = {
        fillColor: "#4f46e5", // Bold Indigo
        color: "#312e81",     // Dark Indigo border
        weight: 3,
        opacity: 1,
        fillOpacity: 0.25
    };

    const backgroundStyle = {
        fillColor: "#94a3b8",
        color: "#64748b",
        weight: 1.5,
        opacity: 0.4,
        fillOpacity: 0.08
    };

    function addLabel(latlng, text, extraClass = '') {
        const labelIcon = L.divIcon({
            className: `country-label ${extraClass}`,
            html: text,
            iconSize: [140, 20]
        });
        L.marker(latlng, { icon: labelIcon, interactive: false }).addTo(map);
    }

    async function loadMap() {
        try {
            const [es, gtm, hnd] = await Promise.all([
                fetch('el_salvador.geojson').then(r => r.json()),
                fetch('guatemala.geojson').then(r => r.json()),
                fetch('honduras.geojson').then(r => r.json())
            ]);

            L.geoJSON(gtm, { style: backgroundStyle }).addTo(map);
            L.geoJSON(hnd, { style: backgroundStyle }).addTo(map);
            L.geoJSON(es, { style: focusStyle }).addTo(map);

            // Guatemala: Moved down significantly (14.5 -> 14.1)
            addLabel([14.1, -90.2], 'Guatemala', 'label-neighbor');
            
            // Honduras: Maintained Westward position
            addLabel([14.3, -88.5], 'Honduras', 'label-neighbor');
            
            // El Salvador: More prominent label
            addLabel([13.78, -88.9], 'El Salvador', 'label-es');

        } catch (error) {
            console.error('Error rendering map:', error);
        }
    }

    loadMap();
</script>

    loadMap();
</script>

</script>
</body>
</html>
