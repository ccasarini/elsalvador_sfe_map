<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Salvador Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body { margin: 0; padding: 0; background: #f8fafc; overflow: hidden; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background: #f1f5f9; /* Soft slate background */
        }
        .map-header {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 1000;
            background: #ffffff;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
            font-family: 'Inter', sans-serif;
        }
        .map-header h1 {
            margin: 0;
            font-size: 1.1rem;
            color: #0f172a;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .country-label {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .label-es {
            color: #1e40af;
            font-size: 15px;
            text-shadow: 0 0 8px rgba(255,255,255,0.8);
        }
        .label-neighbor {
            color: #64748b;
            font-size: 10px;
            background: rgba(255,255,255,0.7);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            backdrop-filter: blur(2px);
        }
        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="map-header">
    <h1><span>🇸🇻</span> El Salvador</h1>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {
        zoomControl: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        touchZoom: false,
        boxZoom: false,
        dragging: true
    }).setView([13.85, -88.9], 9);

    const focusStyle = {
        fillColor: "#3b82f6",
        color: "#2563eb",
        weight: 2,
        opacity: 1,
        fillOpacity: 0.15
    };

    const backgroundStyle = {
        fillColor: "#cbd5e0",
        color: "#94a3b8",
        weight: 1,
        opacity: 0.5,
        fillOpacity: 0.1
    };

    function addLabel(latlng, text, extraClass = '') {
        const labelIcon = L.divIcon({
            className: `country-label ${extraClass}`,
            html: text,
            iconSize: [120, 20]
        });
        L.marker(latlng, { icon: labelIcon, interactive: false }).addTo(map);
    }

    async function loadMap() {
        try {
            const [es, gtm, hnd] = await Promise.all([
                fetch('el_salvador.geojson').then(r => r.json()),
                fetch('guatemala.geojson').then(r => r.json()),
                fetch('honduras.geojson').then(r => r.json())
            ]);

            L.geoJSON(gtm, { style: backgroundStyle }).addTo(map);
            L.geoJSON(hnd, { style: backgroundStyle }).addTo(map);
            L.geoJSON(es, { style: focusStyle }).addTo(map);

            // Corrected positions based on user feedback
            // Guatemala: Further West to avoid crossing border line
            addLabel([14.5, -90.1], 'Guatemala', 'label-neighbor');
            
            // Honduras: Moved significantly more to the Left (West) to be more intuitive
            addLabel([14.3, -88.5], 'Honduras', 'label-neighbor');
            
            addLabel([13.78, -88.9], 'El Salvador', 'label-es');

        } catch (error) {
            console.error('Error rendering map:', error);
        }
    }

    loadMap();
</script>

    loadMap();
</script>

</script>
</body>
</html>
