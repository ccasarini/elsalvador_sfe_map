<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Salvador Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #eef2f5; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background: #eef2f5; /* Modern soft blue-gray background */
        }
        .map-header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .map-header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #1a202c;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .country-label {
            color: #4a5568;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Subtle glass-morphism for labels */
            text-shadow: 0 0 4px rgba(255,255,255,0.8);
        }
        .label-es {
            color: #2b6cb0;
            font-size: 16px;
        }
        /* Hide Leaflet attribution for a cleaner "app" look */
        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="map-header">
    <h1>El Salvador</h1>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize the map with fixed zoom and disabled interaction for a "fixed" look
    const map = L.map('map', {
        zoomControl: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        touchZoom: false,
        boxZoom: false,
        dragging: true // Allow slight panning for small adjustments
    }).setView([13.7942, -88.8965], 9);

    // Modern Color Palette
    const focusStyle = {
        fillColor: "#3182ce",
        color: "#2c5282",
        weight: 2.5,
        opacity: 0.8,
        fillOpacity: 0.25
    };

    const backgroundStyle = {
        fillColor: "#cbd5e0",
        color: "#a0aec0",
        weight: 1,
        opacity: 0.4,
        fillOpacity: 0.1
    };

    // Function to add labels
    function addLabel(latlng, text, extraClass = '') {
        const labelIcon = L.divIcon({
            className: `country-label ${extraClass}`,
            html: text,
            iconSize: [120, 20]
        });
        L.marker(latlng, { icon: labelIcon, interactive: false }).addTo(map);
    }

    // Load and render GeoJSON layers
    async function loadMap() {
        try {
            const [es, gtm, hnd] = await Promise.all([
                fetch('el_salvador.geojson').then(r => r.json()),
                fetch('guatemala.geojson').then(r => r.json()),
                fetch('honduras.geojson').then(r => r.json())
            ]);

            // Add neighbors
            L.geoJSON(gtm, { style: backgroundStyle }).addTo(map);
            L.geoJSON(hnd, { style: backgroundStyle }).addTo(map);
            
            // Add El Salvador on top
            L.geoJSON(es, { style: focusStyle }).addTo(map);

            // Add clean labels
            addLabel([14.7, -90.3], 'Guatemala');
            addLabel([14.8, -87.2], 'Honduras');
            addLabel([13.79, -88.9], 'El Salvador', 'label-es');

        } catch (error) {
            console.error('Error rendering map:', error);
        }
    }

    loadMap();
</script>

</script>
</body>
</html>
