<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Salvador Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; background: #f0f0f0; }
        .map-title {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 10px 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

<div class="map-title">
    <h1>El Salvador & Neighbors</h1>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize the map centered on El Salvador
    const map = L.map('map').setView([13.7942, -88.8965], 8);

    // Style for El Salvador (Main focus)
    const focusStyle = {
        fillColor: "#3388ff",
        color: "#0044aa",
        weight: 3,
        opacity: 1,
        fillOpacity: 0.4
    };

    // Style for neighboring countries (Quiet)
    const backgroundStyle = {
        fillColor: "#cccccc",
        color: "#999999",
        weight: 1,
        opacity: 0.6,
        fillOpacity: 0.1
    };

    // Function to load and add GeoJSON to map
    async function addLayer(url, style) {
        try {
            const response = await fetch(url);
            const data = await response.json();
            L.geoJSON(data, { style: style }).addTo(map);
        } catch (error) {
            console.error('Error loading GeoJSON:', url, error);
        }
    }

    // Load neighbors first (background)
    addLayer('guatemala.geojson', backgroundStyle);
    addLayer('honduras.geojson', backgroundStyle);

    // Load El Salvador last (foreground focus)
    addLayer('el_salvador.geojson', focusStyle);

</script>
</body>
</html>
