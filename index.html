<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Salvador Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body { margin: 0; padding: 0; background: #ffffff; overflow: hidden; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background: #ffffff;
        }
        .map-header {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 1000;
            background: #1e293b;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            font-family: 'Inter', sans-serif;
        }
        .map-header h1 {
            margin: 0;
            font-size: 1rem;
            color: #ffffff;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .country-label {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .label-es {
            color: #0f172a;
            font-size: 32px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
            pointer-events: none;
        }
        .label-community {
            color: #7c3aed; /* Vibrant Purple */
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 900;
            text-transform: none;
            text-align: center;
            line-height: 1.1;
            filter: drop-shadow(0 0 12px rgba(255,255,255,1));
            pointer-events: none;
        }
        .community-pin {
            background: #8b5cf6; /* Vibrant Purple */
            border: 3px solid white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.5);
        }
        .label-neighbor {
            color: #94a3b8;
            font-size: 22px;
            font-weight: 400;
        }
        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="map-header">
    <h1><span>🇸🇻</span> EL SALVADOR</h1>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {
        zoomControl: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        touchZoom: false,
        boxZoom: false,
        dragging: true
    }).setView([13.85, -88.9], 9);

    const focusStyle = {
        fillColor: "#1e293b", // Deep Slate
        color: "#0f172a",     // Midnight border
        weight: 1.5,
        opacity: 1,
        fillOpacity: 0.85     // Solid, modern look
    };

    const communityStyle = {
        fillColor: "#ffffff",
        color: "#7c3aed", // Vibrant Purple
        weight: 3,
        opacity: 1,
        fillOpacity: 0.7
    };

    const backgroundStyle = {
        fillColor: "transparent", // No fill for neighbors for a sleeker look
        color: "#e2e8f0",
        weight: 2,
        opacity: 1
    };

    function addLabel(latlng, text, extraClass = '') {
        const labelIcon = L.divIcon({
            className: `country-label ${extraClass}`,
            html: text,
            iconSize: [200, 50]
        });
        L.marker(latlng, { icon: labelIcon, interactive: false }).addTo(map);
    }

    async function loadMap() {
        try {
            const [caRes, sfeRes] = await Promise.all([
                fetch('central_america.geojson'),
                fetch('sfe_community.geojson')
            ]);
            
            const data = await caRes.json();
            const sfeData = await sfeRes.json();

            const esFeature = data.features.find(f => f.properties['ISO3166-1-Alpha-3'] === 'SLV');
            const gtmFeature = data.features.find(f => f.properties['ISO3166-1-Alpha-3'] === 'GTM');
            const hndFeature = data.features.find(f => f.properties['ISO3166-1-Alpha-3'] === 'HND');

            if (gtmFeature) L.geoJSON(gtmFeature, { style: backgroundStyle }).addTo(map);
            if (hndFeature) L.geoJSON(hndFeature, { style: backgroundStyle }).addTo(map);
            if (esFeature) L.geoJSON(esFeature, { style: focusStyle }).addTo(map);

            // Add the Community Border
            L.geoJSON(sfeData, { style: communityStyle }).addTo(map);

            // Add the Community Pin Marker
            const sfeCoords = [13.8833, -88.9500];
            L.marker(sfeCoords, {
                icon: L.divIcon({
                    className: 'community-pin',
                    iconSize: [20, 20],
                    iconAnchor: [10, 20]
                }),
                interactive: false
            }).addTo(map);

            // Tight composition for high-end image export
            addLabel([14.2, -90.2], 'Guatemala', 'label-neighbor');
            addLabel([14.15, -88.3], 'Honduras', 'label-neighbor');
            addLabel([13.65, -88.9], 'El Salvador', 'label-es'); 
            
            // Community label - prominent and modern
            addLabel([14.02, -88.95], 'San Francisco<br>Echeverría', 'label-community');

        } catch (error) {
            console.error('Error rendering map:', error);
        }
    }

    loadMap();
</script>

    loadMap();
</script>

</script>
</body>
</html>
