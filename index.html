<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Salvador Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body { margin: 0; padding: 0; background: #ffffff; overflow: hidden; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background: #ffffff;
        }
        .country-label {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em; /* Modern tight tracking */
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .label-es {
            color: #1e3a8a;
            font-size: 34px;
            text-shadow: 0 0 15px rgba(255,255,255,1);
        }
        .label-community {
            color: #c2410c; /* Deep Amber/Orange */
            font-family: 'Inter', sans-serif;
            font-size: 18px; /* Slightly larger for extra clarity */
            font-weight: 900;
            text-transform: none;
            text-align: center;
            line-height: 1;
            filter: drop-shadow(0 0 12px rgba(255,255,255,1)) drop-shadow(0 0 4px rgba(255,255,255,1));
            pointer-events: none;
        }
        .community-pin {
            background: #f97316; /* Vibrant Orange */
            border: 3px solid white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 8px 16px rgba(249, 115, 22, 0.3);
        }
        .label-neighbor {
            color: #94a3b8;
            font-size: 22px;
            font-weight: 700;
            opacity: 0.8;
        }
        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {
        zoomControl: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        touchZoom: false,
        boxZoom: false,
        dragging: true
    }).setView([13.85, -88.9], 9.2); /* Slightly deeper zoom to tighten frame */

    const focusStyle = {
        fillColor: "#4338ca", // Modern Indigo Blue
        color: "#1e3a8a",
        weight: 1,
        opacity: 1,
        fillOpacity: 0.25
    };

    const communityStyle = {
        fillColor: "#ffffff",
        color: "#f97316", // Vibrant Orange
        weight: 3,
        opacity: 1,
        fillOpacity: 0.8
    };

    const backgroundStyle = {
        fillColor: "transparent",
        color: "#e2e8f0",
        weight: 2,
        opacity: 1
    };

    function addLabel(latlng, text, extraClass = '') {
        const labelIcon = L.divIcon({
            className: `country-label ${extraClass}`,
            html: text,
            iconSize: [200, 50]
        });
        L.marker(latlng, { icon: labelIcon, interactive: false }).addTo(map);
    }

    async function loadMap() {
        try {
            const [caRes, sfeRes] = await Promise.all([
                fetch('central_america.geojson'),
                fetch('sfe_community.geojson')
            ]);
            
            const data = await caRes.json();
            const sfeData = await sfeRes.json();

            const esFeature = data.features.find(f => f.properties['ISO3166-1-Alpha-3'] === 'SLV');
            const gtmFeature = data.features.find(f => f.properties['ISO3166-1-Alpha-3'] === 'GTM');
            const hndFeature = data.features.find(f => f.properties['ISO3166-1-Alpha-3'] === 'HND');

            if (gtmFeature) L.geoJSON(gtmFeature, { style: backgroundStyle }).addTo(map);
            if (hndFeature) L.geoJSON(hndFeature, { style: backgroundStyle }).addTo(map);
            if (esFeature) L.geoJSON(esFeature, { style: focusStyle }).addTo(map);

            // Community Border
            L.geoJSON(sfeData, { style: communityStyle }).addTo(map);

            // Community Pin
            const sfeCoords = [13.8833, -88.9500];
            L.marker(sfeCoords, {
                icon: L.divIcon({
                    className: 'community-pin',
                    iconSize: [18, 18],
                    iconAnchor: [9, 18]
                }),
                interactive: false
            }).addTo(map);

            // Precise composition: Labels near borders but strictly outside
            // Guatemala: Moved to a safe but close North-West position
            addLabel([14.28, -90.1], 'Guatemala', 'label-neighbor');
            
            // Honduras: Moved to a safe but close North-East position
            addLabel([14.22, -88.3], 'Honduras', 'label-neighbor');
            
            // El Salvador: Central but shifted south to balance neighbors
            addLabel([13.62, -88.9], 'El Salvador', 'label-es'); 
            
            // Community label - Moved further North to avoid overlapping with the pin
            addLabel([13.98, -88.95], 'San Francisco<br>Echeverría', 'label-community');

        } catch (error) {
            console.error('Error rendering map:', error);
        }
    }

    loadMap();
</script>

            console.error('Error rendering map:', error);
        }
    }

    loadMap();
</script>
</body>
</html>
